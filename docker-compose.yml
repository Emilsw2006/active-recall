version: "3.9"

services:
  backend:
    build: .
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - BACKEND/.env
    volumes:
      # Kokoro model cache persists across container restarts
      - kokoro_cache:/root/.cache/huggingface
      # Piper TTS model files (.onnx + .json)
      - piper_models:/app/BACKEND/.piper_models
    environment:
      - PYTHONUNBUFFERED=1
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  # Nginx reverse proxy with SSL (Let's Encrypt via certbot)
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_conf:/etc/letsencrypt:ro
    depends_on:
      - backend

  # Certbot for free SSL
  certbot:
    image: certbot/certbot
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_conf:/etc/letsencrypt
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

volumes:
  kokoro_cache:
  piper_models:
  certbot_www:
  certbot_conf:
