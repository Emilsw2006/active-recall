# Nginx config — replace TU_DOMINIO.COM with your actual domain
# After getting SSL cert, swap the HTTP block for HTTPS

server {
    listen 80;
    server_name TU_DOMINIO.COM www.TU_DOMINIO.COM;

    # Let's Encrypt challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all HTTP to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name TU_DOMINIO.COM www.TU_DOMINIO.COM;

    ssl_certificate /etc/letsencrypt/live/TU_DOMINIO.COM/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/TU_DOMINIO.COM/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    client_max_body_size 50M;

    # WebSocket support
    location /ws {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # All other requests
    location / {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
