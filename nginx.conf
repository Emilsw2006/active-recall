# Configuración básica para acceso por IP (HTTP)
# Una vez tengas dominio, podrás activar el bloque HTTPS

server {
    listen 80;
    server_name _; # Acepta cualquier nombre o IP

    client_max_body_size 50M;

    # WebSocket support
    location /ws {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # All other requests (Frontend and API)
    location / {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Certbot challenge (mantenlo para cuando tengas dominio)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
}

